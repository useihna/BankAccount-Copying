<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계좌번호 복사</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; /* 카드 최대 너비 제한 */ }
        
        /* [중요] 이미지 스타일 정의 */
        .profile-img {
            width: 150px;       /* 이미지 너비 (원하는 대로 조절 가능) */
            height: 150px;      /* 이미지 높이 (너비와 똑같이 맞춰서 1:1 유지) */
            object-fit: cover;  /* 이미지가 비율에 맞게 꽉 차도록 설정 */
            border-radius: 50%; /* 원형으로 만들고 싶다면 이 줄을 유지, 사각형을 원하면 삭제 */
            margin-bottom: 1rem; /* 이미지 아래쪽 간격 */
            border: 3px solid #eee; /* 선택사항: 이미지 테두리 */
        }

        h1 { font-size: 1.2rem; color: #333; margin-top: 0; margin-bottom: 1rem; }
        .account { font-size: 1.4rem; font-weight: bold; color: #007bff; margin-bottom: 1.5rem; cursor: pointer; padding: 15px; border: 2px dashed #007bff; border-radius: 8px; background-color: #f9f9f9; overflow-wrap: break-word; /* 긴 계좌번호 줄바꿈 */ }
        .btn { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.3s; width: 100%; /* 버튼 너비를 꽉 차게 */ }
        .btn:active { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <img src="TITLE_2024.04.26_Dice.png" alt="행사 로고" class="profile-img">

        <h1>계좌번호 복사하기</h1>
        
        <div class="account" id="accountNumber">3333255653355 카카오뱅크</div>
        
        <button class="btn" onclick="copyText()">복사하기</button>
    </div>

    <script>
        function copyText() {
            const text = document.getElementById('accountNumber').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('복사되었습니다: ' + text);
            }).catch(err => {
                console.error('복사 실패:', err);
                alert('복사에 실패했습니다. 직접 복사해 주세요.');
            });
        }
    </script>

</body>
</html>
